name: Docker

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t boondoggle .

      - name: Run container
        run: docker run --rm -d --name boondoggle -p 9731:9731 boondoggle

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:9731/docs > /dev/null; then
              echo "Container is up"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "Container failed to become healthy"
          docker logs boondoggle
          exit 1

      - name: Stop container
        if: always()
        run: docker stop boondoggle

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/boondoggle
          docker tag boondoggle $IMAGE:latest
          docker tag boondoggle $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}